<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>增值税电子发票管理报销工具</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1677ff;--blue-h:#0958d9;--blue-l:#e6f4ff;
  --green:#52c41a;--orange:#fa8c16;--red:#ff4d4f;--purple:#722ed1;
  --bg:#f0f2f5;--card:#fff;--border:#e8e8e8;
  --text:#1d1d1f;--t2:#595959;--muted:#8c8c8c;
  --r:12px;--s:0 2px 8px rgba(0,0,0,.07);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh}

header{background:linear-gradient(135deg,#1677ff,#0958d9);padding:18px 32px;
  display:flex;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(22,119,255,.3)}
header .logo{font-size:30px}
header h1{color:#fff;font-size:20px;font-weight:700}
header p{color:rgba(255,255,255,.75);font-size:13px;margin-top:2px}

main{max-width:1400px;margin:26px auto;padding:0 24px}

.card{background:var(--card);border-radius:var(--r);box-shadow:var(--s);margin-bottom:20px}
.card-hd{display:flex;align-items:center;justify-content:space-between;
  padding:13px 20px;border-bottom:1px solid var(--border)}
.card-hd h2{font-size:15px;font-weight:600}
.card-bd{padding:20px}

.dz{border:2px dashed var(--border);border-radius:10px;padding:40px 20px;
  text-align:center;cursor:pointer;transition:.2s;background:#fafafa;position:relative}
.dz.over{border-color:var(--blue);background:var(--blue-l)}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dz-icon{font-size:44px;margin-bottom:10px}
.dz-hint{font-size:15px;margin-bottom:4px}
.dz-hint span{color:var(--blue);font-weight:500}
.dz-sub{font-size:13px;color:var(--muted)}

#file-list{margin-top:14px;display:flex;flex-direction:column;gap:7px;
  max-height:220px;overflow-y:auto}
.fi{display:flex;align-items:center;gap:10px;background:#f6f8fa;
  border-radius:8px;padding:9px 12px;font-size:13px}
.fi-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fi-size{color:var(--muted);flex-shrink:0}
.fi-st{flex-shrink:0;font-size:12px;min-width:48px;text-align:right}
.fi-rm{background:none;border:none;color:var(--muted);cursor:pointer;
  padding:2px 6px;border-radius:4px;font-size:15px;transition:color .15s}
.fi-rm:hover{color:var(--red)}

.action-bar{display:flex;gap:10px;align-items:center;margin-top:16px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;
  border-radius:8px;font-size:14px;font-weight:500;border:none;cursor:pointer;
  transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:not(:disabled):hover{background:var(--blue-h)}
.btn-green{background:var(--green);color:#fff}.btn-green:not(:disabled):hover{background:#389e0d}
.btn-teal{background:#13c2c2;color:#fff}.btn-teal:not(:disabled):hover{background:#08979c}
.btn-orange{background:var(--orange);color:#fff}.btn-orange:not(:disabled):hover{background:#d46b08}
.btn-ghost{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn-ghost:not(:disabled):hover{border-color:var(--blue);color:var(--blue)}
#status-msg{font-size:13px;color:var(--muted)}

#prog-wrap{margin-top:14px;display:none}
.pb-bg{background:#f0f0f0;border-radius:4px;height:6px;overflow:hidden}
.pb-fill{background:var(--blue);height:6px;border-radius:4px;
  transition:width .25s;width:0}
#prog-text{font-size:12px;color:var(--muted);margin-top:5px}

#summary{display:none;background:var(--card);border-radius:var(--r);
  box-shadow:var(--s);margin-bottom:20px;flex-wrap:wrap}
.si{flex:1;min-width:110px;text-align:center;padding:14px 16px;
  border-right:1px solid var(--border)}
.si:last-child{border-right:none}
.si .val{font-size:26px;font-weight:700}
.si .lbl{font-size:12px;color:var(--muted);margin-top:3px}

#search-bar{display:none;align-items:center;gap:10px;
  padding:10px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap}
#search-input{flex:1;min-width:160px;padding:7px 12px;border:1px solid var(--border);
  border-radius:8px;font-size:13px;outline:none;transition:border-color .2s}
#search-input:focus{border-color:var(--blue)}
.fsel{padding:7px 10px;border:1px solid var(--border);border-radius:8px;
  font-size:13px;outline:none;background:#fff;cursor:pointer}
.fsel:focus{border-color:var(--blue)}

.time-filter{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 20px;
  border-bottom:1px solid var(--border);background:#fafafa}
.time-btn{padding:5px 12px;border:1px solid var(--border);border-radius:6px;
  background:#fff;font-size:12px;cursor:pointer;transition:all .15s}
.time-btn:hover{border-color:var(--blue);color:var(--blue)}
.time-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.time-divider{width:1px;height:20px;background:var(--border);margin:0 4px}
.date-input{padding:5px 8px;border:1px solid var(--border);border-radius:6px;
  font-size:12px;outline:none;width:130px}
.date-input:focus{border-color:var(--blue)}

.stats-tabs{display:flex;gap:4px;margin-bottom:12px}
.stats-tab{padding:6px 14px;border:none;border-radius:6px;background:#f0f0f0;
  font-size:13px;cursor:pointer;transition:all .15s}
.stats-tab:hover{background:#e6e6e6}
.stats-tab.active{background:var(--blue);color:#fff}
.stats-panel{display:none}
.stats-panel.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px}
.stats-item{background:#f6f8fa;border-radius:8px;padding:12px;text-align:center}
.stats-item .val{font-size:22px;font-weight:700;color:var(--blue)}
.stats-item .lbl{font-size:11px;color:var(--muted);margin-top:4px}
.stats-item.green .val{color:var(--green)}
.stats-item.orange .val{color:var(--orange)}
.stats-item.red .val{color:var(--red)}

.reimb-btn{padding:2px 10px;border:none;border-radius:100px;font-size:11px;
  cursor:pointer;transition:all .15s}
.reimb-btn.pending{background:#fff7e6;color:#d46b08}
.reimb-btn.done{background:#f6ffed;color:#389e0d}
.reimb-btn:hover{opacity:.8}

#result-card{display:none}
.tbl-wrap{overflow-x:auto;max-height:520px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#fafafa;padding:10px 13px;text-align:left;font-weight:600;
  color:var(--t2);white-space:nowrap;border-bottom:1px solid var(--border);
  cursor:pointer;user-select:none;position:sticky;top:0;z-index:1}
th:hover{color:var(--blue)}
th .sa{font-size:10px;margin-left:3px;color:var(--muted)}
th.asc .sa::after{content:"▲";color:var(--blue)}
th.desc .sa::after{content:"▼";color:var(--blue)}
th:not(.asc):not(.desc) .sa::after{content:"⇅"}
td{padding:10px 13px;border-bottom:1px solid #f5f5f5;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f5f9ff;cursor:pointer}
.td-file{color:var(--t2);max-width:80px;overflow:hidden;text-overflow:ellipsis;font-size:12px}
.td-price{font-weight:700;color:var(--blue)}
.act-btn{background:none;border:none;color:var(--blue);cursor:pointer;
  font-size:12px;padding:3px 8px;border-radius:5px;transition:background .15s}
.act-btn:hover{background:var(--blue-l)}
.no-data{text-align:center;padding:48px;color:var(--muted);font-size:14px}

.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500}
.bg{background:#e6f4ff;color:#1677ff}
.bc{background:#fff7e6;color:#d46b08}
.bd{background:#f6ffed;color:#389e0d}
.bk{background:#fff1f0;color:#cf1322}
.bo{background:#f5f5f5;color:#595959}
.bs{background:#fff7e6;color:#d46b08}
.nt{display:inline-block;padding:1px 6px;border-radius:4px;
  font-size:11px;background:#fff2f0;color:#ff4d4f;margin-right:3px}
.nt.student{background:#f6ffed;color:#52c41a}

#tbl-foot{display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;border-top:1px solid var(--border);
  font-size:13px;color:var(--muted);flex-wrap:wrap;gap:8px}

#chart-sec{display:none}
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(450px,1fr));gap:20px;margin-bottom:20px}
.cc{background:var(--card);border-radius:var(--r);box-shadow:var(--s);padding:20px}
.cc h3{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--t2)}
.cw{position:relative;height:250px}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:999;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--r);width:100%;max-width:700px;
  max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2);
  animation:pop .18s ease}
@keyframes pop{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
.mo-hd{display:flex;align-items:center;justify-content:space-between;
  padding:15px 20px;border-bottom:1px solid var(--border)}
.mo-hd h3{font-size:16px;font-weight:600}
.mo-close{background:none;border:none;font-size:20px;cursor:pointer;
  color:var(--muted);padding:4px 8px;border-radius:6px}
.mo-close:hover{color:var(--text)}
.mo-bd{padding:20px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.di{background:#fafafa;border-radius:8px;padding:10px 14px}
.di.full{grid-column:1/-1}
.di .lbl{font-size:11px;color:var(--muted);margin-bottom:4px}
.di .val{font-size:14px;font-weight:500;word-break:break-all}

@media(max-width:768px){.cg{grid-template-columns:1fr}}
@media(max-width:640px){
  main{padding:0 12px}
  header{padding:14px 16px}
  .si{min-width:80px}
  .dg{grid-template-columns:1fr}
  .di.full{grid-column:auto}
}
</style>
</head>
<body>

<header>
  <div class="logo">🧾</div>
  <div>
    <h1>增值税电子发票管理报销工具</h1>
    <p>上传 PDF 发票，自动提取信息 · 报销管理 · 图表统计 · 导出 CSV / Excel</p>
  </div>
</header>

<main>
  <div class="card">
    <div class="card-hd"><h2>📁 上传发票文件</h2></div>
    <div class="card-bd">
      <div class="dz" id="dropzone">
        <input type="file" id="file-input" accept=".pdf" multiple/>
        <div class="dz-icon">📄</div>
        <div class="dz-hint"><span>点击选择</span> 或将 PDF 文件拖拽至此</div>
        <div class="dz-sub">支持批量上传 · 仅限 .pdf 格式 · 最大 100 MB</div>
      </div>
      <div id="file-list"></div>
      <div class="action-bar">
        <button class="btn btn-blue"  id="btn-parse"    disabled>🔍 开始解析</button>
        <button class="btn btn-green" id="btn-dl-csv"   disabled>⬇ 导出 CSV</button>
        <button class="btn btn-teal"  id="btn-dl-excel" disabled>📊 导出 Excel</button>
        <button class="btn btn-orange" id="btn-load"     >📂 加载数据</button>
        <button class="btn btn-blue"  id="btn-save"     disabled>💾 保存数据</button>
        <button class="btn btn-ghost" id="btn-clear">🗑 清空</button>
        <span id="status-msg"></span>
      </div>
      <div id="prog-wrap">
        <div class="pb-bg"><div class="pb-fill" id="pb-fill"></div></div>
        <div id="prog-text">正在解析...</div>
      </div>
    </div>
  </div>

  <div id="summary" class="card" style="display:none">
    <div class="card-bd">
      <div class="stats-tabs">
        <button class="stats-tab active" data-view="overview">概览</button>
        <button class="stats-tab" data-view="month">月度</button>
        <button class="stats-tab" data-view="seller">销售方</button>
      </div>
      <div id="stats-overview" class="stats-panel active">
        <div class="stats-grid">
          <div class="stats-item"><div class="val" id="s-total">0</div><div class="lbl">共解析</div></div>
          <div class="stats-item green"><div class="val" id="s-ok">0</div><div class="lbl">成功提取</div></div>
          <div class="stats-item orange"><div class="val" id="s-skip">0</div><div class="lbl">跳过/未识别</div></div>
          <div class="stats-item"><div class="val" id="s-amount">¥0</div><div class="lbl">价税合计</div></div>
          <div class="stats-item green"><div class="val" id="s-reimb-done">¥0</div><div class="lbl">已报销</div></div>
          <div class="stats-item orange"><div class="val" id="s-reimb-pending">¥0</div><div class="lbl">待报销</div></div>
        </div>
      </div>
      <div id="stats-month" class="stats-panel"></div>
      <div id="stats-seller" class="stats-panel"></div>
    </div>
  </div>

  <div id="chart-sec">
    <div class="cg">
      <div class="cc"><h3>📅 按月份发票金额统计（元）</h3><div class="cw"><canvas id="c-month-amount"></canvas></div></div>
      <div class="cc"><h3>📊 按月份发票数量统计</h3><div class="cw"><canvas id="c-month-count"></canvas></div></div>
      <div class="cc"><h3>🏢 销售方分布 Top 8</h3><div class="cw"><canvas id="c-seller"></canvas></div></div>
      <div class="cc"><h3>📈 报销状态分布</h3><div class="cw"><canvas id="c-reimb"></canvas></div></div>
      <div class="cc"><h3>📋 发票状态分布</h3><div class="cw"><canvas id="c-invoice-status"></canvas></div></div>
      <div class="cc"><h3>💰 税率分布</h3><div class="cw"><canvas id="c-tax-rate"></canvas></div></div>
    </div>
  </div>

  <div class="card" id="result-card">
    <div class="card-hd">
      <h2>📋 解析结果</h2>
      <span id="row-count" style="font-size:13px;color:var(--muted)"></span>
    </div>
    <div class="time-filter" id="time-filter">
      <span style="font-size:12px;color:var(--muted)">时间筛选：</span>
      <button class="time-btn active" data-range="all">全部</button>
      <button class="time-btn" data-range="month">本月</button>
      <button class="time-btn" data-range="quarter">本季度</button>
      <button class="time-btn" data-range="year">本年度</button>
      <span class="time-divider"></span>
      <input type="date" class="date-input" id="date-start" title="开始日期"/>
      <span style="color:var(--muted)">至</span>
      <input type="date" class="date-input" id="date-end" title="结束日期"/>
      <button class="time-btn" id="btn-custom-range">自定义</button>
    </div>
    <div id="search-bar">
      <input type="text" id="search-input" placeholder="搜索：购买方、销售方、商品名称..."/>
      <select class="fsel" id="f-seller"><option value="">全部销售方</option></select>
      <select class="fsel" id="f-status"><option value="">全部发票状态</option>
        <option value="正常">正常</option><option value="作废">作废</option><option value="红冲">红冲</option></select>
      <select class="fsel" id="f-reimb">
        <option value="">全部报销状态</option>
        <option value="pending">未报销</option>
        <option value="done">已报销</option>
      </select>
    </div>
    <div class="tbl-wrap">
      <table><thead id="t-head"></thead><tbody id="t-body"></tbody></table>
    </div>
    <div id="tbl-foot">
      <span id="f-count"></span>
      <span id="f-sum"></span>
    </div>
  </div>
</main>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mo-hd">
      <h3 id="mo-title">发票详情</h3>
      <button class="mo-close" id="mo-close">✕</button>
    </div>
    <div class="mo-bd" id="mo-body"></div>
  </div>
</div>

<script>
let selFiles=[], allRec=[], filtRec=[], fields=[];
let sortCol="开票日期", sortDir="desc", charts={};
let timeRange="all", dateStart="", dateEnd="";

const COLS=["文件名","发票号码","开票日期","购买方名称","销售方名称","价税合计","发票状态","报销状态","操作"];
const DETAIL_COLS=["文件名","发票号码","发票代码","开票日期","购买方名称","购买方税号","购买方银行账号",
  "销售方名称","销售方税号","销售方地址电话","货物或应税劳务名称","规格型号","计量单位","数量",
  "单价","金额","税率","税额","价税合计","发票状态","备注","校验码","电子发票编号","报销状态","报销日期","部门/项目"];

const $=id=>document.getElementById(id);
const dz=$("dropzone"), fi=$("file-input"), flist=$("file-list");
const btnParse=$("btn-parse"), btnCsv=$("btn-dl-csv"), btnXls=$("btn-dl-excel"),
      btnLoad=$("btn-load"), btnSave=$("btn-save"), btnClear=$("btn-clear");
const statusMsg=$("status-msg"), pbWrap=$("prog-wrap"), pbFill=$("pb-fill"), pbText=$("prog-text");
const summary=$("summary"), chartSec=$("chart-sec"), resultCard=$("result-card");
const searchBar=$("search-bar"), searchInput=$("search-input");
const fSeller=$("f-seller"), fStatus=$("f-status"), fReimb=$("f-reimb");
const thead=$("t-head"), tbody=$("t-body");
const rowCount=$("row-count"), fCount=$("f-count"), fSum=$("f-sum");
const overlay=$("overlay"), moTitle=$("mo-title"), moBody=$("mo-body");
const timeFilter=$("time-filter"), dateStartInput=$("date-start"), dateEndInput=$("date-end");

fi.addEventListener("change",()=>addFiles([...fi.files]));
dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("over")});
dz.addEventListener("dragleave",()=>dz.classList.remove("over"));
dz.addEventListener("drop",e=>{
  e.preventDefault(); dz.classList.remove("over");
  addFiles([...e.dataTransfer.files].filter(f=>f.name.toLowerCase().endsWith(".pdf")));
});
function addFiles(files){
  for(const f of files)
    if(!selFiles.find(x=>x.name===f.name&&x.size===f.size)) selFiles.push(f);
  renderFList(); fi.value="";
}
function removeFile(i){ selFiles.splice(i,1); renderFList(); }
function renderFList(){
  flist.innerHTML="";
  selFiles.forEach((f,i)=>{
    const d=document.createElement("div"); d.className="fi";
    d.innerHTML=`<span>📄</span>
      <span class="fi-name" title="${esc(f.name)}">${esc(f.name)}</span>
      <span class="fi-size">${fmtSz(f.size)}</span>
      <span class="fi-st" id="fs${i}"></span>
      <button class="fi-rm" onclick="removeFile(${i})">✕</button>`;
    flist.appendChild(d);
  });
  btnParse.disabled=selFiles.length===0;
  statusMsg.textContent=selFiles.length?`已选 ${selFiles.length} 个文件`:"";
}

btnParse.addEventListener("click",async()=>{
  if(!selFiles.length) return;
  btnParse.disabled=true; btnCsv.disabled=true; btnXls.disabled=true; btnSave.disabled=true;
  pbWrap.style.display="block"; pbFill.style.width="0%";
  statusMsg.textContent=""; allRec=[];

  for(let i=0;i<selFiles.length;i++){
    const f=selFiles[i];
    pbFill.style.width=Math.round(i/selFiles.length*100)+"%";
    pbText.textContent=`解析中 (${i+1}/${selFiles.length}): ${f.name}`;
    const st=$("fs"+i);
    if(st){st.textContent="…";st.style.color="var(--muted)";}
    try{
      const fd=new FormData(); fd.append("file",f);
      const r=await fetch("/api/parse_one",{method:"POST",body:fd});
      if(!r.ok) throw new Error("HTTP "+r.status);
      const d=await r.json();
      fields=d.fields; allRec.push(d.record);
      if(st){st.textContent=d.record["发票号码"]?"✓":"⚠";
        st.style.color=d.record["发票号码"]?"var(--green)":"var(--orange)";}
    }catch(e){
      const rec={}; (fields.length?fields:DETAIL_COLS).forEach(k=>rec[k]="");
      rec["文件名"]=f.name; rec["备注"]="解析失败:"+e.message;
      allRec.push(rec);
      if(st){st.textContent="✗";st.style.color="var(--red)";}
    }
  }
  pbFill.style.width="100%"; pbText.textContent="全部解析完成";
  setTimeout(()=>pbWrap.style.display="none",900);

  buildSellerOpts(allRec);
  renderSummary(allRec);
  applyFilter();
  renderCharts(allRec);
  btnCsv.disabled=false; btnXls.disabled=false; btnSave.disabled=false;
  statusMsg.textContent=`解析完成，共 ${allRec.length} 条`;
});

btnLoad.addEventListener("click",async()=>{
  try{
    const r=await fetch("/api/load_data");
    if(!r.ok) throw new Error("加载失败");
    const d=await r.json();
    if(d.records && d.records.length>0){
      allRec=d.records;
      fields=d.fields;
      buildSellerOpts(allRec);
      renderSummary(allRec);
      applyFilter();
      renderCharts(allRec);
      btnCsv.disabled=false; btnXls.disabled=false; btnSave.disabled=false;
      statusMsg.textContent=`已加载 ${allRec.length} 条记录`;
    } else {
      statusMsg.textContent="没有保存的数据";
    }
  }catch(e){
    statusMsg.textContent="加载失败："+e.message;
  }
});

btnSave.addEventListener("click",async()=>{
  if(!allRec.length) return;
  try{
    const r=await fetch("/api/save_data",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({records:allRec})
    });
    if(!r.ok) throw new Error("保存失败");
    statusMsg.textContent="数据已保存到本地";
  }catch(e){
    statusMsg.textContent="保存失败："+e.message;
  }
});

btnClear.addEventListener("click",()=>{
  selFiles=[]; allRec=[]; filtRec=[];
  renderFList();
  thead.innerHTML=""; tbody.innerHTML="";
  resultCard.style.display="none";
  summary.style.display="none";
  chartSec.style.display="none";
  searchBar.style.display="none";
  timeFilter.style.display="none";
  btnCsv.disabled=true; btnXls.disabled=true; btnSave.disabled=true;
  statusMsg.textContent="";
  Object.values(charts).forEach(c=>c&&c.destroy&&c.destroy()); charts={};
  timeRange="all";
  document.querySelectorAll(".time-btn[data-range]").forEach(b=>b.classList.remove("active"));
  document.querySelector(".time-btn[data-range='all']").classList.add("active");
  dateStartInput.value=""; dateEndInput.value="";
  dateStart=""; dateEnd="";
  fReimb.value=""; fStatus.value="";
});

function renderSummary(recs){
  const ok=recs.filter(r=>r["发票号码"]).length;
  const total=recs.reduce((s,r)=>s+(parseFloat(r["价税合计"])||0),0);
  const doneTotal=recs.filter(r=>r["报销状态"]==="已报销")
    .reduce((s,r)=>s+(parseFloat(r["价税合计"])||0),0);
  const pendingTotal=recs.filter(r=>r["报销状态"]!=="已报销")
    .reduce((s,r)=>s+(parseFloat(r["价税合计"])||0),0);
  $("s-total").textContent=recs.length;
  $("s-ok").textContent=ok;
  $("s-skip").textContent=recs.length-ok;
  $("s-amount").textContent="¥"+total.toFixed(2);
  $("s-reimb-done").textContent="¥"+doneTotal.toFixed(2);
  $("s-reimb-pending").textContent="¥"+pendingTotal.toFixed(2);
  summary.style.display="block";
}

function renderMonthStats(recs){
  const mMap={};
  recs.forEach(r=>{
    const m=(r["开票日期"]||"").match(/(\d{4})年(\d{1,2})月/);
    if(!m) return;
    const k=m[1]+"-"+m[2].padStart(2,"0");
    if(!mMap[k]) mMap[k]={count:0,amount:0};
    mMap[k].count++;
    mMap[k].amount+=parseFloat(r["价税合计"])||0;
  });
  const keys=Object.keys(mMap).sort();
  if(!keys.length){
    $("stats-month").innerHTML='<div style="color:var(--muted);text-align:center;padding:20px">暂无数据</div>';
    return;
  }
  let html='<div class="stats-grid">';
  keys.forEach(k=>{
    html+=`<div class="stats-item"><div class="val">${k}</div>`+
          `<div class="lbl">${mMap[k].count}张 · ¥${mMap[k].amount.toFixed(2)}</div></div>`;
  });
  html+='</div>';
  $("stats-month").innerHTML=html;
}

function renderSellerStats(recs){
  const sMap={};
  recs.forEach(r=>{
    const s=r["销售方名称"]||"未知";
    if(!sMap[s]) sMap[s]={count:0,amount:0};
    sMap[s].count++;
    sMap[s].amount+=parseFloat(r["价税合计"])||0;
  });
  const entries=Object.entries(sMap).sort((a,b)=>b[1].amount-a[1].amount).slice(0,10);
  if(!entries.length){
    $("stats-seller").innerHTML='<div style="color:var(--muted);text-align:center;padding:20px">暂无数据</div>';
    return;
  }
  let html='<div class="stats-grid">';
  entries.forEach(([k,v])=>{
    html+=`<div class="stats-item"><div class="val" style="font-size:16px">${esc(k)}</div>`+
          `<div class="lbl">${v.count}张 · ¥${v.amount.toFixed(2)}</div></div>`;
  });
  html+='</div>';
  $("stats-seller").innerHTML=html;
}

document.querySelectorAll(".stats-tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll(".stats-tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    document.querySelectorAll(".stats-panel").forEach(p=>p.classList.remove("active"));
    const view=tab.dataset.view;
    $(`stats-${view}`).classList.add("active");
    if(view==="month") renderMonthStats(filtRec);
    if(view==="seller") renderSellerStats(filtRec);
  });
});

function buildSellerOpts(recs){
  const sellers=[...new Set(recs.map(r=>r["销售方名称"]).filter(Boolean))].sort();
  fSeller.innerHTML='<option value="">全部销售方</option>';
  sellers.forEach(s=>fSeller.insertAdjacentHTML("beforeend",
    `<option value="${esc(s)}">${esc(s)}</option>`));
}
searchInput.addEventListener("input",applyFilter);
fSeller.addEventListener("change",applyFilter);
fStatus.addEventListener("change",applyFilter);
fReimb.addEventListener("change",applyFilter);

function parseDate(dateStr){
  const m=(dateStr||"").match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if(!m) return null;
  return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
}

function getDateRange(range){
  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth();
  if(range==="month"){
    return {start:new Date(year,month,1), end:new Date(year,month+1,0)};
  }else if(range==="quarter"){
    const q=Math.floor(month/3);
    return {start:new Date(year,q*3,1), end:new Date(year,q*3+3,0)};
  }else if(range==="year"){
    return {start:new Date(year,0,1), end:new Date(year,11,31)};
  }
  return null;
}

document.querySelectorAll(".time-btn[data-range]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".time-btn[data-range]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    timeRange=btn.dataset.range;
    dateStartInput.value="";
    dateEndInput.value="";
    dateStart=""; dateEnd="";
    applyFilter();
  });
});

$("btn-custom-range").addEventListener("click",()=>{
  if(!dateStartInput.value || !dateEndInput.value){
    alert("请选择开始和结束日期");
    return;
  }
  document.querySelectorAll(".time-btn[data-range]").forEach(b=>b.classList.remove("active"));
  timeRange="custom";
  dateStart=dateStartInput.value;
  dateEnd=dateEndInput.value;
  applyFilter();
});

function applyFilter(){
  const kw=searchInput.value.trim().toLowerCase();
  const fs=fSeller.value, fst=fStatus.value, fr=fReimb.value;
  const dateRange=timeRange!=="all" && timeRange!=="custom" ? getDateRange(timeRange) : null;
  filtRec=allRec.filter(r=>{
    if(fs&&r["销售方名称"]!==fs) return false;
    if(fst&&r["发票状态"]!==fst) return false;
    if(fr){
      const status=r["报销状态"]||"未报销";
      if(fr==="done" && status!=="已报销") return false;
      if(fr==="pending" && status==="已报销") return false;
    }
    if(dateRange){
      const d=parseDate(r["开票日期"]);
      if(!d || d<dateRange.start || d>dateRange.end) return false;
    }
    if(timeRange==="custom" && dateStart && dateEnd){
      const d=parseDate(r["开票日期"]);
      const start=new Date(dateStart);
      const end=new Date(dateEnd);
      if(!d || d<start || d>end) return false;
    }
    if(kw){
      const hay=[r["购买方名称"],r["销售方名称"],r["货物或应税劳务名称"],r["文件名"],r["备注"]]
        .join(" ").toLowerCase();
      if(!hay.includes(kw)) return false;
    }
    return true;
  });
  sortRec(); renderTable();
  renderSummary(filtRec);
}
function sortRec(){
  filtRec.sort((a,b)=>{
    let av=a[sortCol]||"", bv=b[sortCol]||"";
    if(sortCol==="价税合计"){av=parseFloat(av)||0;bv=parseFloat(bv)||0;
      return sortDir==="asc"?av-bv:bv-av;}
    return sortDir==="asc"?String(av).localeCompare(String(bv),"zh")
                          :String(bv).localeCompare(String(av),"zh");
  });
}

function renderTable(){
  thead.innerHTML="<tr>"+COLS.map(c=>{
    if(c==="操作") return `<th style="cursor:default;width:60px"></th>`;
    if(c==="报销状态") return `<th style="cursor:default;width:80px">${esc(c)}</th>`;
    const cls=c===sortCol?sortDir:"";
    return `<th class="${cls}" onclick="setSort('${c}')">${esc(c)}<span class="sa"></span></th>`;
  }).join("")+"</tr>";

  if(!filtRec.length){
    tbody.innerHTML=`<tr><td colspan="${COLS.length}" class="no-data">暂无数据</td></tr>`;
  } else {
    tbody.innerHTML=filtRec.map((row,i)=>"<tr>"+COLS.map(col=>{
      const v=row[col]||"";
      if(col==="操作")    return `<td><button class="act-btn" onclick="showDetail(${i})">详情</button></td>`;
      if(col==="报销状态") return `<td>${reimbBtn(allRec.indexOf(row),v||"未报销")}</td>`;
      if(col==="发票状态") return `<td>${statusBadge(v)}</td>`;
      if(col==="文件名")  return `<td class="td-file" title="${esc(v)}">${esc(v)}</td>`;
      if(col==="价税合计"&&v) return `<td class="td-price">¥${esc(v)}</td>`;
      return `<td>${esc(v)||dash()}</td>`;
    }).join("")+"</tr>").join("");
  }
  const tot=filtRec.reduce((s,r)=>s+(parseFloat(r["价税合计"])||0),0);
  rowCount.textContent=`共 ${allRec.length} 条`;
  fCount.textContent=`筛选后 ${filtRec.length} 条`;
  fSum.textContent=filtRec.length?`合计 ¥${tot.toFixed(2)}`:"";
  resultCard.style.display="block";
  timeFilter.style.display="flex";
  searchBar.style.display="flex";
}
function setSort(col){
  if(col==="报销状态"||col==="操作") return;
  sortDir=sortCol===col?(sortDir==="asc"?"desc":"asc"):"asc";
  sortCol=col; applyFilter();
}
function dash(){return `<span style="color:var(--muted)">-</span>`;}

function statusBadge(status){
  const cls=status==="正常"?"bd":status==="作废"?"bk":"bc";
  return `<span class="badge ${cls}">${esc(status)}</span>`;
}

function reimbBtn(idx,status){
  const isDone=status==="已报销";
  const cls=isDone?"done":"pending";
  const label=isDone?"已报销":"未报销";
  return `<button class="reimb-btn ${cls}" onclick="toggleReimb(${idx})">${label}</button>`;
}

function toggleReimb(idx){
  const r=allRec[idx];
  r["报销状态"]=r["报销状态"]==="已报销"?"未报销":"已报销";
  if(r["报销状态"]==="已报销" && !r["报销日期"]){
    const now=new Date();
    r["报销日期"]=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  }
  applyFilter();
}

function showDetail(i){
  const r=filtRec[i];
  moTitle.textContent="🧾 "+(r["文件名"]||"发票详情");
  const items=[
    {l:"发票号码",v:r["发票号码"]},{l:"发票代码",v:r["发票代码"]},
    {l:"开票日期",v:r["开票日期"]},{l:"购买方名称",v:r["购买方名称"]},
    {l:"购买方税号",v:r["购买方税号"],f:1},{l:"购买方银行账号",v:r["购买方银行账号"]},
    {l:"销售方名称",v:r["销售方名称"]},{l:"销售方税号",v:r["销售方税号"]},
    {l:"销售方地址电话",v:r["销售方地址电话"],f:1},
    {l:"货物名称",v:r["货物或应税劳务名称"]},{l:"规格型号",v:r["规格型号"]},
    {l:"计量单位",v:r["计量单位"]},{l:"数量",v:r["数量"]},
    {l:"单价",v:r["单价"]},{l:"金额",v:r["金额"]},
    {l:"税率",v:r["税率"]},{l:"税额",v:r["税额"]},
    {l:"价税合计",v:r["价税合计"]?"¥"+r["价税合计"]:""},
    {l:"发票状态",v:r["发票状态"]},{l:"报销状态",v:r["报销状态"]},
    {l:"报销日期",v:r["报销日期"]},{l:"校验码",v:r["校验码"],f:1},
    {l:"备注",v:r["备注"],f:1},
  ];
  moBody.innerHTML=`<div class="dg">`+items.map(it=>
    `<div class="di${it.f?" full":""}">
      <div class="lbl">${esc(it.l)}</div>
      <div class="val">${esc(it.v||"-")}</div>
    </div>`).join("")+"</div>";
  overlay.classList.add("open");
}
$("mo-close").onclick=()=>overlay.classList.remove("open");
overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.classList.remove("open");});
document.addEventListener("keydown",e=>{if(e.key==="Escape")overlay.classList.remove("open");});

function renderCharts(recs){
  chartSec.style.display="block";
  Object.values(charts).forEach(c=>c&&c.destroy&&c.destroy()); charts={};

  const mMap={};
  recs.forEach(r=>{
    const m=(r["开票日期"]||"").match(/(\d{4})年(\d{1,2})月/);
    if(!m) return;
    const k=m[1]+"-"+m[2].padStart(2,"0");
    if(!mMap[k]) mMap[k]={count:0,amount:0};
    mMap[k].count++;
    mMap[k].amount+=parseFloat(r["价税合计"])||0;
  });
  const mK=Object.keys(mMap).sort();
  charts.monthAmount=new Chart($("c-month-amount"),{type:"bar",data:{
    labels:mK,datasets:[{label:"价税合计(元)",data:mK.map(k=>+mMap[k].amount.toFixed(2)),
      backgroundColor:"rgba(22,119,255,.75)",borderRadius:5,borderSkipped:false}]
  },options:opts1()});
  charts.monthCount=new Chart($("c-month-count"),{type:"bar",data:{
    labels:mK,datasets:[{label:"发票数量",data:mK.map(k=>mMap[k].count),
      backgroundColor:"rgba(82,196,26,.75)",borderRadius:5,borderSkipped:false}]
  },options:opts1()});

  const sMap={};
  recs.forEach(r=>{const s=r["销售方名称"]||"未知"; sMap[s]=(sMap[s]||0)+1;});
  const top8=Object.entries(sMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  charts.seller=new Chart($("c-seller"),{type:"doughnut",data:{
    labels:top8.map(x=>x[0]),datasets:[{data:top8.map(x=>x[1]),
      backgroundColor:["#1677ff","#fa8c16","#52c41a","#ff4d4f","#722ed1","#13c2c2","#8c8c8c","#eb2f96"],
      borderWidth:2,borderColor:"#fff"}]
  },options:optsD()});

  const reimbMap={已报销:0,未报销:0};
  recs.forEach(r=>{const s=r["报销状态"]||"未报销"; reimbMap[s]=(reimbMap[s]||0)+1;});
  charts.reimb=new Chart($("c-reimb"),{type:"pie",data:{
    labels:["已报销","未报销"],datasets:[{data:[reimbMap["已报销"],reimbMap["未报销"]],
      backgroundColor:["#52c41a","#fa8c16"],borderWidth:2,borderColor:"#fff"}]
  },options:optsD()});

  const statusMap={正常:0,作废:0,红冲:0};
  recs.forEach(r=>{const s=r["发票状态"]||"正常"; statusMap[s]=(statusMap[s]||0)+1;});
  charts.status=new Chart($("c-invoice-status"),{type:"doughnut",data:{
    labels:["正常","作废","红冲"],datasets:[{data:[statusMap["正常"],statusMap["作废"],statusMap["红冲"]],
      backgroundColor:["#52c41a","#ff4d4f","#fa8c16"],borderWidth:2,borderColor:"#fff"}]
  },options:optsD()});

  const taxMap={};
  recs.forEach(r=>{const t=r["税率"]||"未知"; taxMap[t]=(taxMap[t]||0)+1;});
  const taxEntries=Object.entries(taxMap).filter(e=>e[1]>0);
  charts.tax=new Chart($("c-tax-rate"),{type:"bar",data:{
    labels:taxEntries.map(x=>x[0]),datasets:[{label:"数量",data:taxEntries.map(x=>x[1]),
      backgroundColor:"rgba(114,46,209,.75)",borderRadius:5,borderSkipped:false}]
  },options:{...opts1(),indexAxis:"y"}});
}
function opts1(){return{responsive:true,maintainAspectRatio:false,
  plugins:{legend:{display:false}},
  scales:{y:{beginAtZero:true,grid:{color:"#f0f0f0"}},x:{grid:{display:false}}}};}
function optsD(){return{responsive:true,maintainAspectRatio:false,
  plugins:{legend:{position:"right",labels:{boxWidth:12,font:{size:12}}}}};}

btnCsv.addEventListener("click",async()=>{
  if(!allRec.length) return;
  const r=await fetch("/api/download_csv",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({records:allRec})});
  dlBlob(await r.blob(),"fapiao.csv");
});
btnXls.addEventListener("click",async()=>{
  if(!allRec.length) return;
  const orig=btnXls.innerHTML;
  btnXls.disabled=true; btnXls.textContent="⏳ 生成中...";
  try{
    const r=await fetch("/api/download_excel",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({records:allRec})});
    if(!r.ok){const j=await r.json();alert("导出失败："+j.error);return;}
    dlBlob(await r.blob(),"fapiao.xlsx");
  }finally{btnXls.disabled=false;btnXls.innerHTML=orig;}
});
function dlBlob(blob,name){
  const u=URL.createObjectURL(blob);
  Object.assign(document.createElement("a"),{href:u,download:name}).click();
  setTimeout(()=>URL.revokeObjectURL(u),2000);
}

function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function fmtSz(b){
  if(b<1024) return b+" B";
  if(b<1048576) return (b/1024).toFixed(1)+" KB";
  return (b/1048576).toFixed(1)+" MB";
}
